# argentumOS partition-module configuration.
#
# Drives the upstream Calamares `partition` view-step + job. Without this
# file the module loads with empty config and reports "no partitions found"
# because it has no allowed filesystems or default layout to apply.
#
# argentumOS's custom `nixos-install` job takes care of bootloader install
# and writing configuration.nix, so this file only needs to describe what
# the partition UI exposes and the auto-partition scheme it lays down.

---
efi:
    mountPoint: "/boot"
    recommendedSize: 1GiB
    minimumSize: 300MiB
    label: "EFI"

userSwapChoices:
    - none
    - small
    - suspend

luksGeneration: luks2

defaultFileSystemType: "ext4"
availableFileSystemTypes:
    - ext4
    - btrfs
    - xfs

# argentumOS encourages encrypted boot but does not require it; let the
# warning surface so users know what they're choosing.
showNotEncryptedBootMessage: true

# Single-root auto-partition: the nixos-install module reads /mnt at the
# end of the exec phase and doesn't care about subvolume layouts.
partitionLayout:
    - name: "root"
      filesystem: "unknown"
      mountPoint: "/"
      size: 100%
