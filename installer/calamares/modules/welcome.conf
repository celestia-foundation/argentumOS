# argentumOS welcome-module configuration.
#
# Required-vs-checked semantics: items listed under `check` are evaluated
# and rendered with status icons; items listed under `required` block the
# install when they fail. Internet is a warning but not a blocker — the
# installer can still proceed offline as long as the substituters and
# nixos closure are reachable when `nixos-install` runs.

---
showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: false

requirements:
    requiredStorage:  5.5
    requiredRam:      1.0
    internetCheckUrl: https://nixos.org/
    check:
        - storage
        - ram
        - power
        - internet
        - root
        - screen
    required:
        - storage
        - ram
        - root
