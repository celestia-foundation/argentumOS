# argentumOS Calamares configuration
#
# Module sequence and branding for the live-ISO installer. This file is
# placed at /etc/calamares/settings.conf on the live ISO by modules/installer.nix.
#
# `local` resolves only to <calamares-prefix>/{lib,share}/calamares/modules,
# i.e. paths inside Calamares' own Nix store output. The explicit
# /etc/calamares/modules path is where modules/installer.nix mounts our
# custom `nixos-install` Python module, so both are listed.

---
modules-search: [ local, /etc/calamares/modules ]

# Single instance of our custom NixOS install job. Referenced below as
# `nixos-install@nixos-install`.
instances:
  - id: nixos-install
    module: nixos-install

# The branding directory name under share/calamares/branding/.
branding: argentum

# Show the "Are you sure?" prompt before the destructive exec phase.
prompt-install: true

# Run job modules inside the target chroot where applicable. The
# nixos-install module manages its own chroot semantics via nixos-install(8).
dont-chroot: false

sequence:
  # Interactive phase: collect user choices.
  # `welcome` / `summary` are our custom QML view-steps; the rest are
  # upstream Calamares C++ widget pages, themed via stylesheet.qss.
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary

  # Destructive phase: apply choices.
  #
  # On NixOS the system is materialised declaratively: our `nixos-install`
  # job writes /mnt/etc/nixos/configuration.nix from the values collected in
  # the show phase, runs nixos-generate-config, then nixos-install(8). That
  # single step replaces the upstream unpackfs + bootloader + machineid +
  # fstab + users + networkcfg sequence — those modules all run usermod /
  # chroot / file writes against /mnt before any system has been built into
  # it, which on an empty target either no-ops or, in the case of `users`,
  # fails with `usermod terminated with error code 127` (no usermod inside
  # an empty chroot). Keep this list minimal: partition, mount, our job,
  # umount.
  - exec:
      - partition
      - mount
      - nixos-install@nixos-install
      - umount

  # Final page with a Restart button. Upstream module is named `finished`
  # (not `finish`) — list in `pkgs.calamares` confirms.
  - show:
      - finished
